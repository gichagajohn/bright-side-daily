name: 🌟 Bright Side Daily — Auto Poster

on:
  schedule:
    # ── All times UTC. Kenya EAT = UTC+3 ──────────────────────────────────
    # Facebook allows up to ~25 posts/day. 10 posts is well within limits.
    #
    #  UTC   →  EAT      Slot
    - cron: '0 5 * * *'   # 08:00 AM EAT — Morning Motivation
    - cron: '0 7 * * *'   # 10:00 AM EAT — Positive Quote
    - cron: '0 8 * * *'   # 11:00 AM EAT — Self Improvement
    - cron: '0 9 * * *'   # 12:00 PM EAT — Funny Meme
    - cron: '0 10 * * *'  # 01:00 PM EAT — Midday Encouragement
    - cron: '0 11 * * *'  # 02:00 PM EAT — Afternoon Wisdom
    - cron: '0 13 * * *'  # 04:00 PM EAT — Gratitude Moment
    - cron: '0 15 * * *'  # 06:00 PM EAT — Engagement Question
    - cron: '0 16 * * *'  # 07:00 PM EAT — Evening Reflection
    - cron: '0 18 * * *'  # 09:00 PM EAT — Night Inspiration

  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot to post (leave empty for auto-detect)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — true skips actual Facebook posting'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  post:
    name: 📢 Post to Facebook
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Content library check ───────────────────────────────────────────
      - name: Generate content library (if missing)
        run: |
          if [ ! -f "content/library.json" ]; then
            echo "Content library missing — generating..."
            python scripts/generate_content_library.py
          else
            echo "Content library exists."
          fi

      # ── 5. Detect slot ─────────────────────────────────────────────────────
      - name: Determine slot
        id: slot_detect
        run: |
          HOUR=$(date -u +%H)
          INPUT_SLOT="${{ github.event.inputs.slot }}"

          if [ -n "$INPUT_SLOT" ]; then
            SLOT="$INPUT_SLOT"
            echo "Manual slot: $SLOT"
          elif [ "$HOUR" = "05" ]; then
            SLOT="morning_motivation"
          elif [ "$HOUR" = "07" ]; then
            SLOT="positive_quote"
          elif [ "$HOUR" = "08" ]; then
            SLOT="self_improvement"
          elif [ "$HOUR" = "09" ]; then
            SLOT="funny_meme"
          elif [ "$HOUR" = "10" ]; then
            SLOT="midday_encouragement"
          elif [ "$HOUR" = "11" ]; then
            SLOT="afternoon_wisdom"
          elif [ "$HOUR" = "13" ]; then
            SLOT="gratitude_moment"
          elif [ "$HOUR" = "15" ]; then
            SLOT="engagement_question"
          elif [ "$HOUR" = "16" ]; then
            SLOT="evening_reflection"
          elif [ "$HOUR" = "18" ]; then
            SLOT="night_inspiration"
          else
            SLOT="morning_motivation"
            echo "Unknown hour $HOUR — defaulting to morning_motivation"
          fi

          echo "slot=$SLOT" >> $GITHUB_OUTPUT
          echo "Selected slot: $SLOT"

      # ── 6. Retry failed posts ──────────────────────────────────────────────
      - name: Retry failed posts
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          python src/scheduler.py --retry-failed || echo "No failed posts to retry."

      # ── 7. Post to Facebook ────────────────────────────────────────────────
      - name: Post to Facebook
        id: post
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          SLOT="${{ steps.slot_detect.outputs.slot }}"
          echo "Posting slot: $SLOT"
          python src/scheduler.py --slot "$SLOT"

      # ── 8. Collect metrics ─────────────────────────────────────────────────
      - name: Collect engagement metrics
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          python src/agents/performance_agent.py || echo "Metrics skipped."
        continue-on-error: true

      # ── 9. Commit state ────────────────────────────────────────────────────
      - name: Commit state files
        run: |
          git config --local user.email "brightside-bot@users.noreply.github.com"
          git config --local user.name "Bright Side Daily Bot"
          git add data/ content/ --force
          git diff --staged --quiet || git commit -m "🤖 Auto: state update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: true

      # ── 10. Upload images ──────────────────────────────────────────────────
      - name: Upload post images
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-images-${{ steps.slot_detect.outputs.slot }}-${{ github.run_number }}
          path: images/output/
          retention-days: 30

      # ── 11. Upload logs ────────────────────────────────────────────────────
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ steps.slot_detect.outputs.slot }}-${{ github.run_number }}
          path: data/logs/
          retention-days: 14